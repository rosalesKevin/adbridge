<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#171b24"/>
      <stop offset="100%" stop-color="#0e1014"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4d9fff"/>
      <stop offset="100%" stop-color="#2a6ce8"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bg)" stroke="#1a202c" stroke-width="8"/>

  <!-- Android Robot Head (Top half circle) -->
  <path d="M 156 240 A 100 100 0 0 1 356 240 Z" fill="#dde5f2" />
  
  <!-- Antennas -->
  <line x1="206" y1="160" x2="176" y2="110" stroke="#dde5f2" stroke-width="16" stroke-linecap="round" />
  <line x1="306" y1="160" x2="336" y2="110" stroke="#dde5f2" stroke-width="16" stroke-linecap="round" />

  <!-- Eyes -->
  <circle cx="216" cy="190" r="12" fill="#0e1014" />
  <circle cx="296" cy="190" r="12" fill="#0e1014" />

  <!-- Bridge Body (Suspension Arches) -->
  <!-- Arch 1 -->
  <path d="M 156 260 C 156 260, 206 320, 256 260" fill="none" stroke="url(#bridgeGrad)" stroke-width="24" stroke-linecap="round" />
  <!-- Arch 2 -->
  <path d="M 256 260 C 256 260, 306 320, 356 260" fill="none" stroke="url(#bridgeGrad)" stroke-width="24" stroke-linecap="round" />

  <!-- Connecting pillars from deck to head -->
  <line x1="156" y1="240" x2="156" y2="360" stroke="url(#bridgeGrad)" stroke-width="24" />
  <line x1="256" y1="240" x2="256" y2="360" stroke="url(#bridgeGrad)" stroke-width="24" />
  <line x1="356" y1="240" x2="356" y2="360" stroke="url(#bridgeGrad)" stroke-width="24" />

  <!-- Main Bridge Deck -->
  <line x1="120" y1="360" x2="392" y2="360" stroke="#dde5f2" stroke-width="24" stroke-linecap="round" />
  
  <!-- Little wheels or nodes on the deck to hint at tech -->
  <circle cx="156" cy="360" r="8" fill="#0e1014" />
  <circle cx="256" cy="360" r="8" fill="#0e1014" />
  <circle cx="356" cy="360" r="8" fill="#0e1014" />
</svg>