<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>ADBridge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header-bar">
        <h1 class="app-title">ADBridge <span id="appVersion" class="app-version" aria-label="Application version"></span></h1>
        <div class="header-center">
            <button id="refreshDevicesBtn" class="btn btn-icon btn-small" title="Refresh devices">↻</button>
            <select id="deviceSelect" class="device-select">
                <option value="">No devices</option>
            </select>
            <button id="wirelessBtn" class="btn btn-small btn-secondary" disabled title="Set up wireless ADB">⊛ Wireless</button>
            <button id="mirrorBtn" class="btn btn-small btn-secondary" disabled>Mirror</button>
        </div>
        <div class="header-right">
            <span id="statusDot" class="status-dot offline"></span>
            <span id="statusLabel" class="status-text">Checking ADB...</span>
        </div>
    </header>

    <div id="updateBanner" class="update-banner hidden">
        <div id="updateBannerAvailable" class="update-banner-state">
            <span id="updateBannerMsg" class="update-banner-msg"></span>
            <button id="updateNowBtn" class="btn btn-small btn-primary">Update Now</button>
            <button id="updateLaterBtn" class="btn btn-small btn-ghost">Later</button>
        </div>
        <div id="updateBannerDownloading" class="update-banner-state hidden">
            <span class="update-banner-msg">Downloading update...</span>
            <div class="update-progress-bar">
                <div id="updateProgressFill" class="update-progress-fill"></div>
            </div>
            <span id="updateProgressPct" class="update-banner-pct"></span>
        </div>
        <div id="updateBannerError" class="update-banner-state hidden">
            <span class="update-banner-msg update-banner-msg-error">Update failed.</span>
            <button id="updateOpenPageBtn" class="btn btn-small btn-secondary">Open Download Page</button>
            <button id="updateDismissBtn" class="btn btn-small btn-ghost">Dismiss</button>
        </div>
    </div>

    <div id="deviceInfoBar" class="device-info-bar hidden"></div>

    <main class="main-content">

        <!-- FULL-WIDTH PANEL: Tabbed -->
        <section class="panel app-panel">

            <!-- Tab navigation -->
            <div class="tab-bar">
                <button id="tabBtnApps" class="tab-btn active">Applications</button>
                <button id="tabBtnExplorer" class="tab-btn">Device Explorer</button>
                <button id="tabBtnLogcat" class="tab-btn">Logcat</button>
            </div>

            <!-- ══ APPLICATIONS TAB ══ -->
            <div id="tabApps" class="tab-pane active">

                <div class="app-header-row">
                    <h2 class="section-header">Applications</h2>
                    <span id="appCount" class="app-count">0 / 0 apps</span>
                </div>

                <div class="search-row">
                    <input id="searchField" type="text" class="search-field"
                           placeholder="🔍  Filter packages..." autocomplete="off">
                    <label class="checkbox-custom">
                        <input id="showSystemApps" type="checkbox">
                        <span>Include system apps</span>
                    </label>
                </div>

                <ul id="appList" class="item-list app-list">
                    <li class="empty-state">Select a device to view apps</li>
                </ul>

                <div class="section-divider"></div>

                <div class="bottom-actions">
                    <div class="install-section">
                        <div class="file-pick-row">
                            <button id="browseBtn" class="btn btn-secondary btn-icon btn-small" title="Browse for APK file">📂</button>
                            <span id="apkPathLabel" class="file-label">No file selected</span>
                        </div>
                        <button id="installBtn" class="btn btn-success btn-small btn-full" disabled>▶  Install APK</button>
                        <button id="apkAdvancedToggle" class="btn-advanced-toggle">▸ Advanced</button>
                        <div id="apkAdvancedPanel" class="apk-advanced-panel">
                            <button id="apkSigningInfoBtn" class="btn btn-secondary btn-small btn-full" disabled title="Show signing certificate info for the selected APK">🔏  APK Signing Info</button>
                            <button id="inspectKeystoreBtn" class="btn btn-secondary btn-small btn-full" title="Inspect a keystore file">🔑  Inspect Keystore</button>
                        </div>
                    </div>
                    <div class="actions-separator"></div>
                    <div class="app-actions-section">
                        <div class="selected-app-row">
                            <span id="selectedAppName" class="selected-app-label">No app selected</span>
                            <button id="deselectAppBtn" class="btn-deselect hidden" title="Deselect app">×</button>
                        </div>
                        <div class="app-action-row">
                            <button id="clearDataBtn" class="btn btn-warning btn-small" disabled>⌫  Clear Data</button>
                            <button id="uninstallBtn" class="btn btn-danger btn-small" disabled>✕  Uninstall</button>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ══ DEVICE EXPLORER TAB ══ -->
            <div id="tabExplorer" class="tab-pane">

                <!-- Toolbar: breadcrumb + navigation + actions -->
                <div class="explorer-toolbar">
                    <div id="explorerBreadcrumb" class="explorer-breadcrumb">
                        <!-- Populated by renderer.js -->
                    </div>
                    
                    <div class="explorer-nav-row">
                        <button id="explorerUpBtn" class="btn btn-secondary btn-icon btn-small" title="Go up one level">↑</button>
                        <div class="explorer-path-container">
                            <input id="explorerPathInput" type="text" class="dest-input explorer-path-input"
                                   placeholder="/sdcard/" value="/sdcard/" spellcheck="false">
                        </div>
                        <button id="explorerRefreshBtn" class="btn btn-secondary btn-icon btn-small" title="Refresh">↻</button>
                    </div>

                    <div class="explorer-action-row">
                        <div class="action-group">
                            <button id="explorerNewFolderBtn" class="btn btn-secondary btn-small" title="Create new folder">
                                <span>+ New Folder</span>
                            </button>
                            <button id="explorerPushBtn" class="btn btn-secondary btn-small" title="Upload file">
                                <span>↑ Push File</span>
                            </button>
                            <button id="explorerPushFolderBtn" class="btn btn-secondary btn-small" title="Upload folder">
                                <span>📁 Push Folder</span>
                            </button>
                        </div>
                        <div class="action-group-separator"></div>
                        <div class="action-group">
                            <button id="explorerPullBtn" class="btn btn-primary btn-small" disabled title="Download selected">
                                <span>↓ Pull</span>
                            </button>
                            <button id="explorerRenameBtn" class="btn btn-secondary btn-small" disabled title="Rename selected">
                                <span>✎ Rename</span>
                            </button>
                            <button id="explorerDeleteBtn" class="btn btn-danger btn-small" disabled title="Delete selected">
                                <span>✕ Delete</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- File / folder list -->
                <ul id="explorerList" class="item-list explorer-list">
                    <li class="empty-state">Select a device to browse files</li>
                </ul>

                <!-- Status bar -->
                <div class="explorer-status-bar">
                    <span id="explorerStatus" class="explorer-status">—</span>
                    <button id="explorerCancelBtn" class="btn btn-danger btn-small explorer-cancel-btn hidden">✕ Cancel</button>
                    <div id="explorerProgressBar" class="explorer-progress-bar hidden">
                        <div id="explorerProgressFill" class="explorer-progress-fill"></div>
                    </div>
                </div>

            </div>

            <!-- ══ LOGCAT TAB ══ -->
            <div id="tabLogcat" class="tab-pane">

                <div class="logcat-toolbar">
                    <div class="logcat-toolbar-row">
                        <select id="logcatAppSelect" class="logcat-app-select">
                            <option value="">Select app...</option>
                        </select>
                        <button id="logcatFromApkBtn" class="btn btn-secondary btn-small" title="Pick a release APK and auto-fill the app dropdown">📦 From APK</button>
                        <select id="logcatLevelSelect" class="logcat-level-select" title="Minimum log level">
                            <option value="" selected>All</option>
                            <option value="V">Verbose</option>
                            <option value="D">Debug</option>
                            <option value="I">Info</option>
                            <option value="W">Warning</option>
                            <option value="E">Error</option>
                            <option value="F">Fatal</option>
                        </select>
                        <button id="logcatStartBtn" class="btn btn-success btn-small">▶  Start</button>
                        <button id="logcatClearBtn" class="btn btn-secondary btn-small">⌫  Clear</button>
                        <button id="logcatExportBtn" class="btn btn-secondary btn-small">↓  Export</button>
                    </div>
                    <div class="logcat-toolbar-row">
                        <input id="logcatTagInput" type="text" class="logcat-tag-input"
                               placeholder="Tags (optional, comma-separated — e.g. ActivityMain, NetworkUtils)"
                               autocomplete="off" spellcheck="false">
                    </div>
                </div>

                <div id="logcatOutput" class="logcat-area"></div>

            </div>

        </section>

    </main>

    <div id="logResizeHandle" class="log-resize-handle"></div>

    <footer class="log-panel">
        <div class="log-header-row">
            <h2 class="section-header">Log</h2>
            <div class="log-header-actions">
                <button id="clearLogBtn" class="btn btn-small btn-muted">Clear</button>
            </div>
        </div>
        <div id="logOutput" class="log-area"></div>
    </footer>

    <div id="confirmOverlay" class="confirm-overlay" aria-hidden="true">
        <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <h3 id="confirmTitle" class="confirm-title">Confirm action</h3>
            <p id="confirmMessage" class="confirm-message"></p>
            <input id="confirmInput" type="text" class="confirm-input" autocomplete="off" spellcheck="false">
            <div class="confirm-actions">
                <button id="confirmCancelBtn" class="btn btn-secondary btn-small">Cancel</button>
                <button id="confirmOkBtn" class="btn btn-danger btn-small">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script type="module" src="renderer.js"></script>
</body>
</html>
